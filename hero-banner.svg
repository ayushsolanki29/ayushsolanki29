<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F17"/>
      <stop offset="100%" stop-color="#141B2B"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#1E2636"/>
    </pattern>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6EE7E7"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>

  <!-- left content -->
  <text x="64" y="96" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#818CF8">PRODUCTION ENGINEER · FULL-STACK</text>
  <text x="64" y="152" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#F3F6FA">Ayush Solanki</text>
  <text x="64" y="190" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#9AA5B1">I keep production systems running, and build the platforms</text>
  <text x="64" y="214" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#9AA5B1">behind them ~ from AWS infra to backend architecture.</text>

  <text x="64" y="256" font-family="Consolas, Menlo, monospace" font-size="14" fill="#5FE0C0"> Location: Ahmedabad, India</text>

  <!-- right status panel -->
  <g transform="translate(830,52)">
    <rect x="0" y="0" width="306" height="196" rx="14" fill="#111827" stroke="#243047" stroke-width="1.5"/>
    <text x="24" y="34" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#6B7688">SYSTEM STATUS</text>

    <circle cx="30" cy="62" r="5" fill="#5FE0C0">
      <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="44" y="67" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#D6DCE5">35+ apps in production</text>

    <circle cx="30" cy="92" r="5" fill="#818CF8"/>
    <text x="44" y="97" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#D6DCE5">AWS infra, owned end-to-end</text>

    <circle cx="30" cy="122" r="5" fill="#6EE7E7"/>
    <text x="44" y="127" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" fill="#D6DCE5">Zero-loss sync @ 10k+ records</text>

    <!-- mini sparkline -->
    <polyline points="24,168 54,158 84,172 114,150 144,160 174,140 204,148 234,128 264,136 282,120"
      fill="none" stroke="url(#barGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
